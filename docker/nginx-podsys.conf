server {
    listen 5001;
    server_name _;

    # HTTP 根目录 = /workspace（挂载点）
    root /workspace;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # 允许大文件传输（squashfs 可能很大）
    client_max_body_size 0;
    proxy_request_buffering off;

    # iPXE 脚本目录（GRUB 不需要，保留兼容）
    location /ipxe/ {
        alias /tftp/ipxe/;
        types { }
        default_type text/plain;
    }

    # iPXE EFI 文件
    location /ipxe.efi {
        alias /tftp/ipxe.efi;
    }

    # TFTP 根（备用 HTTP 访问）
    location /tftp/ {
        alias /tftp/;
        autoindex on;
    }

    # LiveOS 文件
    location /liveos/ {
        alias /workspace/liveos/;
        autoindex on;
    }

    # ISO 文件
    location /iso/ {
        alias /workspace/iso/;
        autoindex on;
    }

    # user-data（cloud-init 配置）
    location /user-data/ {
        alias /workspace/user-data/;
        autoindex on;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "podsys-lite OK\n";
        add_header Content-Type text/plain;
    }
}
