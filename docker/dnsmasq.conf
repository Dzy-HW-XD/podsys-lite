# Podsys Lite - dnsmasq 配置
# DHCP + TFTP + iPXE 链式引导

# 不使用 bind-interfaces，监听所有网卡（由 entrypoint.sh 的 interface= 限制范围）
# bind-interfaces

# 全局设置
port=0
log-dhcp
log-facility=/var/log/podsys/dnsmasq.log

# TFTP 服务
enable-tftp
tftp-root=/tftp

# DHCP 配置（从 /workspace/config.yaml 读取的值在 entrypoint.sh 中动态注入）
# 以下为默认值，实际运行时会被覆盖
dhcp-range=192.168.100.10,192.168.100.20,12h
dhcp-option=3,192.168.100.1
dhcp-option=6,8.8.8.8

# iPXE 链式引导
# 传统 BIOS 客户端
dhcp-match=set:bios,option:client-arch,0
dhcp-boot=tag:bios,undionly.kpxe

# UEFI x86-64
dhcp-match=set:efi-x64,option:client-arch,7
dhcp-boot=tag:efi-x64,ipxe.efi

# UEFI x86-64 (HTTP Boot)
dhcp-match=set:efi-x64-http,option:client-arch,16
dhcp-boot=tag:efi-x64-http,http://0.0.0.0:5001/ipxe.efi

# UEFI ARM64（GB300 使用 grubaa64.efi 从 ISO 提取）
dhcp-match=set:efi-arm64,option:client-arch,11
dhcp-boot=tag:efi-arm64,grubaa64.efi

# UEFI ARM64 (HTTP Boot)
dhcp-match=set:efi-arm64-http,option:client-arch,17
dhcp-boot=tag:efi-arm64-http,http://0.0.0.0:5001/grubaa64.efi

# iPXE 获取引导菜单
dhcp-userclass=set:ipxe,iPXE
dhcp-boot=tag:ipxe,http://0.0.0.0:5001/ipxe/menu.ipxe
